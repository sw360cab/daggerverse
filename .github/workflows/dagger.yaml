name: dagger
on:
  push:
    branches: [master]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Test
        uses: dagger/dagger-for-github@v7
        with:
          version: "v0.15.2"
          verb: call
          module: samples/gnokey/gnokey-tx
          args: make-txt --home-dir-key=samples/gnokey/ --password-string=helloworld
